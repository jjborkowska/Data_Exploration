{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Results Page</title>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <section class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-4">Your details</h2>
        <p>Age: {{ age }}</p>
        <p>Height: {{ height }} cm</p>
        <p>Weight: {{ weight }} kg</p>
        <p>Activity level: {{ activity_level }}</p>
        <p>Budget: {{ budget }} zł</p>
        <p>Likes animals: {{ like_animals }}</p>
        <a href="/" class="mt-4 inline-block bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-700">Go back</a>
    </section>
</body>
</html>
