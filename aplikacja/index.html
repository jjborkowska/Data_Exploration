<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Welcome!</title>
</head>
<body>
    <div class="flex h-screen flex-col items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 text-center px-4">
  <h1 class="text-4xl md:text-6xl font-extrabold text-white tracking-tight mb-6">
    welcome
    <span id="typed-text" class="text-emerald-400"></span>
  </h1>
  
  <p class="text-slate-400 text-lg md:text-xl max-w-md mb-8">
    Fill our short form and find out Your Next Sport!
  </p>

  <form action="{% url 'index1' %}" method="GET">
    {% csrf_token %}
    <button type="submit" class="px-8 py-4 bg-emerald-500 ...">
        Let's go
    </button>
  </form>
</div>
<script>
  var typed = new Typed('#typed-text', {
   strings: ['Welcome!', 'Fill a quick form,', 'and find your next sport!'],
    typeSpeed: 60,     
    backSpeed: 30,       
    backDelay: 1500,     
    loop: true,          
    cursorChar: '|',
  });
</script>
</body>
</html>
